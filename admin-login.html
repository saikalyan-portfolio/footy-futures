<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Footy Futures Admin Login</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      background: #07111f;
      color: #ffffff;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: #101b2d;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }
    p {
      margin: 0 0 24px;
      color: #aeb8c8;
    }
    label {
      display: block;
      margin: 16px 0 8px;
      font-size: 14px;
      color: #c8d2e0;
    }
    input {
      width: 100%;
      box-sizing: border-box;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.18);
      background: #07111f;
      color: #fff;
      font-size: 15px;
    }
    button {
      width: 100%;
      margin-top: 22px;
      padding: 13px 16px;
      border: 0;
      border-radius: 10px;
      background: #20c997;
      color: #07111f;
      font-weight: 700;
      cursor: pointer;
      font-size: 15px;
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    #error {
      margin-top: 16px;
      color: #ff6b6b;
      min-height: 20px;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Footy Futures</h1>
    <p>Admin login</p>

    <label for="email">Email</label>
    <input id="email" type="email" autocomplete="email" placeholder="admin email" />

    <label for="password">Password</label>
    <input id="password" type="password" autocomplete="current-password" placeholder="password" />

    <button id="loginBtn" onclick="login()">Login</button>

    <div id="error"></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://wwkmoonfbiogfzqioqgk.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind3a21vb25mYmlvZ2Z6cWlvcWdrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwOTg2ODYsImV4cCI6MjA5NjY3NDY4Nn0.museSEVj3LbQuX3YRBsEq4ysWxhgZ1Y2xczJPaxx0Pc";

    const ADMIN_EMAILS = [
      "d.sai.kalyan07@gmail.com"
    ];

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function login() {
      const errorBox = document.getElementById("error");
      const loginBtn = document.getElementById("loginBtn");

      errorBox.textContent = "";
      loginBtn.disabled = true;
      loginBtn.textContent = "Logging in...";

      const email = document.getElementById("email").value.trim().toLowerCase();
      const password = document.getElementById("password").value;

      if (!email || !password) {
        errorBox.textContent = "Enter email and password.";
        loginBtn.disabled = false;
        loginBtn.textContent = "Login";
        return;
      }

      if (!ADMIN_EMAILS.includes(email)) {
        errorBox.textContent = "This email is not authorised for admin access.";
        loginBtn.disabled = false;
        loginBtn.textContent = "Login";
        return;
      }

      const { data, error } = await supabase.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        errorBox.textContent = error.message;
        loginBtn.disabled = false;
        loginBtn.textContent = "Login";
        return;
      }

      window.location.href = "admin.html";
    }

    document.addEventListener("keydown", function(event) {
      if (event.key === "Enter") login();
    });
  </script>
</body>
</html>
