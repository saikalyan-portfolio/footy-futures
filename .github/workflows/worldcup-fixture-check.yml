name: Football Data World Cup Check

on:
  workflow_dispatch:

jobs:
  fixture-check:
    runs-on: ubuntu-latest

    steps:
      - name: Fetch football-data.org World Cup matches
        run: |
          curl --request GET \
            --url "https://api.football-data.org/v4/competitions/WC/matches" \
            --header "X-Auth-Token: ${{ secrets.FOOTBALL_DATA_KEY }}" \
            --output response.json

          echo "===== RAW RESPONSE ====="
          cat response.json
