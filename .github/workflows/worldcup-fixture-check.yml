name: World Cup Fixture Check

on:
  workflow_dispatch:

jobs:
  fixture-check:
    runs-on: ubuntu-latest

    steps:
      - name: Fetch raw response
        run: |
          curl --request GET \
            --url "https://v3.football.api-sports.io/fixtures?league=1&season=2026" \
            --header "x-apisports-key: ${{ secrets.API_FOOTBALL_KEY }}" \
            --output response.json

          echo "===== RAW RESPONSE ====="
          cat response.json
