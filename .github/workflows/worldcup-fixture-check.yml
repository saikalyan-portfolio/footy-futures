name: Zafronix World Cup API Check

on:
  workflow_dispatch:

jobs:
  zafronix-check:
    runs-on: ubuntu-latest

    steps:
      - name: Test Zafronix raw endpoint
        run: |
          echo "Testing likely Zafronix endpoints..."

          echo "===== /wc/matches ====="
          curl --request GET \
            --url "https://api.zafronix.com/wc/matches" \
            --header "Authorization: Bearer ${{ secrets.ZAFRONIX_API_KEY }}" \
            --output zafronix-matches.json

          cat zafronix-matches.json

          echo ""
          echo "===== /wc/tournaments ====="
          curl --request GET \
            --url "https://api.zafronix.com/wc/tournaments" \
            --header "Authorization: Bearer ${{ secrets.ZAFRONIX_API_KEY }}" \
            --output zafronix-tournaments.json

          cat zafronix-tournaments.json
