name: Zafronix World Cup API Check

on:
  workflow_dispatch:

jobs:
  zafronix-check:
    runs-on: ubuntu-latest

    steps:
      - name: Test Zafronix correct endpoints
        run: |
          echo "===== /tournaments ====="
          curl --request GET \
            --url "https://api.zafronix.com/fifa/worldcup/v1/tournaments" \
            --header "X-API-Key: ${{ secrets.ZAFRONIX_API_KEY }}" \
            --output tournaments.json

          cat tournaments.json

          echo ""
          echo "===== /tournaments/2026 ====="
          curl --request GET \
            --url "https://api.zafronix.com/fifa/worldcup/v1/tournaments/2026" \
            --header "X-API-Key: ${{ secrets.ZAFRONIX_API_KEY }}" \
            --output wc2026.json

          cat wc2026.json
