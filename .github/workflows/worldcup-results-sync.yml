name: World Cup Results Sync Live

on:
  workflow_dispatch:
  # Keep the schedule commented until one manual run succeeds cleanly.
  # schedule:
  #   - cron: "17,47 * * * *"

jobs:
  sync-results:
    runs-on: ubuntu-latest

    steps:
      - name: Fetch Zafronix World Cup 2026 results
        run: |
          curl --fail --request GET \
            --url "https://api.zafronix.com/fifa/worldcup/v1/matches?year=2026" \
            --header "X-API-Key: ${{ secrets.ZAFRONIX_API_KEY }}" \
            --output matches.json

          echo "Fetched matches:"
          jq '.count' matches.json

      - name: Sync completed results to Supabase and recalculate leaderboard
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          node --input-type=module <<'NODE'
          import fs from "fs";

          const SUPABASE_URL = process.env.SUPABASE_URL;
          const SERVICE_KEY = process.env.SUPABASE_SERVICE_ROLE_KEY;

          if (!SUPABASE_URL || !SERVICE_KEY) {
            throw new Error("Missing SUPABASE_URL or SUPABASE_SERVICE_ROLE_KEY");
          }

          const raw = JSON.parse(fs.readFileSync("matches.json", "utf8"));
          const matches = raw.data || [];

          const TEAM_CODE_MAP = {
            "Mexico": "mx",
            "South Africa": "za",
            "Korea Republic": "kr",
            "South Korea": "kr",
            "Czechia": "cz",
            "Czech Republic": "cz",
            "Canada": "ca",
            "Bosnia and Herzegovina": "ba",
            "Bosnia-Herzegovina": "ba",
            "Bosnia": "ba",
            "Qatar": "qa",
            "Switzerland": "ch",
            "Brazil": "br",
            "Morocco": "ma",
            "Haiti": "ht",
            "Scotland": "gb-sct",
            "USA": "us",
            "United States": "us",
            "Paraguay": "py",
            "Australia": "au",
            "Türkiye": "tr",
            "Turkey": "tr",
            "Côte d'Ivoire": "ci",
            "Cote d'Ivoire": "ci",
            "Ivory Coast": "ci",
            "Ecuador": "ec",
            "Germany": "de",
            "Curaçao": "cw",
            "Curacao": "cw",
            "Netherlands": "nl",
            "Japan": "jp",
            "Sweden": "se",
            "Tunisia": "tn",
            "IR Iran": "ir",
            "Iran": "ir",
            "New Zealand": "nz",
            "Belgium": "be",
            "Egypt": "eg",
            "Saudi Arabia": "sa",
            "Uruguay": "uy",
            "Spain": "es",
            "Cabo Verde": "cv",
            "Cape Verde": "cv",
            "France": "fr",
            "Senegal": "sn",
            "Iraq": "iq",
            "Norway": "no",
            "Argentina": "ar",
            "Algeria": "dz",
            "Austria": "at",
            "Jordan": "jo",
            "Portugal": "pt",
            "DR Congo": "cd",
            "Congo DR": "cd",
            "Uzbekistan": "uz",
            "Colombia": "co",
            "Ghana": "gh",
            "Panama": "pa",
            "England": "gb-eng",
            "Croatia": "hr"
          };

          function normTeam(name) {
            return TEAM_CODE_MAP[String(name || "").trim()] || "";
          }

          function isFinished(status) {
            return ["finished", "complete", "completed", "ft", "full_time"].includes(
              String(status || "").toLowerCase()
            );
          }

          function scoreValue(value, label, fixture) {
            if (value === null || value === undefined || value === "") return null;
            const n = Number(value);
            if (!Number.isInteger(n) || n < 0) {
              throw new Error(`Invalid ${label} for ${fixture.match_id}: ${value}`);
            }
            return n;
          }

          async function supabase(path, options = {}) {
            const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
              ...options,
              headers: {
                "apikey": SERVICE_KEY,
                "Authorization": `Bearer ${SERVICE_KEY}`,
                "Content-Type": "application/json",
                "Prefer": "resolution=merge-duplicates",
                ...(options.headers || {})
              }
            });

            const text = await res.text();
            if (!res.ok) {
              throw new Error(`${res.status} ${res.statusText}: ${text}`);
            }
            return text ? JSON.parse(text) : null;
          }

          async function rpc(name) {
            const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/${name}`, {
              method: "POST",
              headers: {
                "apikey": SERVICE_KEY,
                "Authorization": `Bearer ${SERVICE_KEY}`,
                "Content-Type": "application/json"
              },
              body: "{}"
            });

            const text = await res.text();
            if (!res.ok) {
              throw new Error(`RPC ${name} failed: ${res.status} ${text}`);
            }
            return text;
          }

          const fixtureRows = await supabase(
            "fixture_map?select=match_id,stage,group_id,match_no,api_fixture_id,home_code,away_code,home_name,away_name&api_fixture_id=not.is.null"
          );

          const fixtureByApiId = new Map();
          for (const fixture of fixtureRows || []) {
            fixtureByApiId.set(String(fixture.api_fixture_id), fixture);
          }

          console.log(`Loaded fixture_map rows: ${fixtureByApiId.size}`);

          const rows = [];
          const skipped = [];

          for (const match of matches) {
            const status = String(match.status || "").toLowerCase();

            if (!isFinished(status)) {
              skipped.push(`unfinished ${match.matchNo} ${match.id} ${status || "unknown"} ${match.homeTeam} vs ${match.awayTeam}`);
              continue;
            }

            const apiFixtureId = String(match.id || match.fixture_id || "");
            const fixture = fixtureByApiId.get(apiFixtureId);

            if (!fixture) {
              throw new Error(
                `Finished API fixture has no fixture_map row. ` +
                `api_fixture_id=${apiFixtureId}, matchNo=${match.matchNo}, ` +
                `${match.homeTeam} vs ${match.awayTeam}, status=${status}`
              );
            }

            const homeCode = normTeam(match.homeTeam);
            const awayCode = normTeam(match.awayTeam);

            if (!homeCode || !awayCode) {
              throw new Error(
                `Could not normalize team code for API ${apiFixtureId}: ${match.homeTeam} vs ${match.awayTeam}`
              );
            }

            if (homeCode !== fixture.home_code || awayCode !== fixture.away_code) {
              throw new Error(
                `Fixture mismatch for API ${apiFixtureId}. ` +
                `API says ${match.homeTeam}(${homeCode}) vs ${match.awayTeam}(${awayCode}); ` +
                `fixture_map says ${fixture.home_name}(${fixture.home_code}) vs ${fixture.away_name}(${fixture.away_code}) ` +
                `for ${fixture.match_id}`
              );
            }

            const homeScore = scoreValue(match.homeScore, "homeScore", fixture);
            const awayScore = scoreValue(match.awayScore, "awayScore", fixture);
            if (homeScore === null || awayScore === null) {
              throw new Error(`Finished fixture ${fixture.match_id} has null score from API ${apiFixtureId}`);
            }

            const penaltiesHome = scoreValue(match.penalties?.home, "penalties.home", fixture);
            const penaltiesAway = scoreValue(match.penalties?.away, "penalties.away", fixture);
            const hasPens = penaltiesHome !== null && penaltiesAway !== null;

            let winnerCode = null;
            let winnerName = null;
            if (homeScore > awayScore) {
              winnerCode = fixture.home_code;
              winnerName = fixture.home_name;
            } else if (awayScore > homeScore) {
              winnerCode = fixture.away_code;
              winnerName = fixture.away_name;
            } else if (hasPens && penaltiesHome !== penaltiesAway) {
              winnerCode = penaltiesHome > penaltiesAway ? fixture.home_code : fixture.away_code;
              winnerName = penaltiesHome > penaltiesAway ? fixture.home_name : fixture.away_name;
            }

            rows.push({
              match_id: fixture.match_id,
              stage: fixture.stage,
              match_no: Number(fixture.match_no),
              home_code: fixture.home_code,
              home_name: fixture.home_name,
              away_code: fixture.away_code,
              away_name: fixture.away_name,
              home_score: homeScore,
              away_score: awayScore,
              after_extra_time_home: null,
              after_extra_time_away: null,
              penalties_home: penaltiesHome,
              penalties_away: penaltiesAway,
              winner_code: winnerCode,
              winner_name: winnerName,
              resolution_method: hasPens ? "penalties" : (match.extraTime ? "extra_time" : "regular_time"),
              completed: true,
              played_at: match.kickoffUtc || match.date || new Date().toISOString(),
              updated_at: new Date().toISOString(),
              api_provider: "zafronix",
              api_fixture_id: apiFixtureId,
              api_status: status,
              last_synced_at: new Date().toISOString()
            });
          }

          console.log(`Completed mapped matches found: ${rows.length}`);
          console.log(`Skipped unfinished/non-final matches: ${skipped.length}`);

          if (rows.length > 0) {
            await supabase("actual_results?on_conflict=match_id", {
              method: "POST",
              body: JSON.stringify(rows)
            });
            console.log(`Upserted ${rows.length} completed results.`);
          } else {
            console.log("No completed matches to sync yet.");
          }

          const validation = await supabase("actual_results_validation_errors?select=*");
          if (validation && validation.length > 0) {
            console.error("actual_results validation errors:", JSON.stringify(validation, null, 2));
            throw new Error(`Validation failed: ${validation.length} actual_results mapping error(s)`);
          }

          const recalculated = await rpc("admin_recalculate_all_scores");
          console.log("Recalculate result:", recalculated);
          NODE
