name: World Cup Results Sync Live

on:
  workflow_dispatch:
  # Third-party cron should trigger workflow_dispatch.
  # Keep GitHub's own schedule commented out.
  # schedule:
  #   - cron: "17,47 * * * *"

jobs:
  sync-results:
    runs-on: ubuntu-latest

    steps:
      - name: Fetch Zafronix World Cup 2026 results
        run: |
          curl --fail --request GET \
            --url "https://api.zafronix.com/fifa/worldcup/v1/matches?year=2026" \
            --header "X-API-Key: ${{ secrets.ZAFRONIX_API_KEY }}" \
            --output matches.json

          echo "Fetched matches:"
          jq '.count // (.data | length)' matches.json

          echo "Completed matches from API:"
          # Debug only. Do not let jq diagnostics fail the workflow.
          jq -r '
            (.data // [])[]
            | select(((.status // "") | tostring | ascii_downcase) as $s
                | ["finished", "complete", "completed", "ft", "full_time"] | index($s))
            | "\((.id // "") | tostring) | matchNo=\((.matchNo // "") | tostring) | \((.homeTeam // "") | tostring) \((.homeScore // "") | tostring)-\((.awayScore // "") | tostring) \((.awayTeam // "") | tostring) | status=\((.status // "") | tostring)"
          ' matches.json || true

      - name: Sync completed results to Supabase and recalculate leaderboard
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          node --input-type=module <<'NODE'
          import fs from "fs";

          const SUPABASE_URL = process.env.SUPABASE_URL;
          const SERVICE_KEY = process.env.SUPABASE_SERVICE_ROLE_KEY;

          if (!SUPABASE_URL || !SERVICE_KEY) {
            throw new Error("Missing SUPABASE_URL or SUPABASE_SERVICE_ROLE_KEY secret.");
          }

          const raw = JSON.parse(fs.readFileSync("matches.json", "utf8"));
          const matches = raw.data || [];

          const TEAM_CODE_MAP = {
            "Mexico": "mx",
            "South Africa": "za",
            "Korea Republic": "kr",
            "South Korea": "kr",
            "Czechia": "cz",
            "Czech Republic": "cz",
            "Canada": "ca",
            "Bosnia and Herzegovina": "ba",
            "Bosnia": "ba",
            "Qatar": "qa",
            "Switzerland": "ch",
            "Brazil": "br",
            "Morocco": "ma",
            "Haiti": "ht",
            "Scotland": "gb-sct",
            "USA": "us",
            "United States": "us",
            "Paraguay": "py",
            "Australia": "au",
            "Türkiye": "tr",
            "Turkey": "tr",
            "Côte d'Ivoire": "ci",
            "Cote d'Ivoire": "ci",
            "Ivory Coast": "ci",
            "Ecuador": "ec",
            "Germany": "de",
            "Curaçao": "cw",
            "Curacao": "cw",
            "Netherlands": "nl",
            "Japan": "jp",
            "Sweden": "se",
            "Tunisia": "tn",
            "IR Iran": "ir",
            "Iran": "ir",
            "New Zealand": "nz",
            "Belgium": "be",
            "Egypt": "eg",
            "Saudi Arabia": "sa",
            "Uruguay": "uy",
            "Spain": "es",
            "Cabo Verde": "cv",
            "Cape Verde": "cv",
            "France": "fr",
            "Senegal": "sn",
            "Iraq": "iq",
            "Norway": "no",
            "Argentina": "ar",
            "Algeria": "dz",
            "Austria": "at",
            "Jordan": "jo",
            "Portugal": "pt",
            "DR Congo": "cd",
            "Congo DR": "cd",
            "Democratic Republic of the Congo": "cd",
            "Uzbekistan": "uz",
            "Colombia": "co",
            "Ghana": "gh",
            "Panama": "pa",
            "England": "gb-eng",
            "Croatia": "hr"
          };

          function normTeam(name) {
            return TEAM_CODE_MAP[String(name || "").trim()] || "";
          }

          function isFinished(status) {
            return ["finished", "complete", "completed", "ft", "full_time"].includes(
              String(status || "").toLowerCase()
            );
          }

          function getMatchNo(match) {
            const value = match.matchNo ?? match.match_no ?? match.matchNumber ?? match.number;
            const matchNo = Number(value);
            return Number.isFinite(matchNo) ? matchNo : null;
          }

          function getInternalKnockoutSlot(match) {
            const matchNo = getMatchNo(match);
            if (!matchNo) return null;

            // Group stage is still handled through fixture_map.
            if (matchNo >= 1 && matchNo <= 72) return null;

            if (matchNo >= 73 && matchNo <= 88) {
              return { match_id: `r32_m${matchNo - 72}`, stage: "r32", slot_no: matchNo - 72 };
            }

            if (matchNo >= 89 && matchNo <= 96) {
              return { match_id: `r16_m${matchNo - 88}`, stage: "r16", slot_no: matchNo - 88 };
            }

            if (matchNo >= 97 && matchNo <= 100) {
              return { match_id: `qf_m${matchNo - 96}`, stage: "qf", slot_no: matchNo - 96 };
            }

            if (matchNo >= 101 && matchNo <= 102) {
              return { match_id: `sf_m${matchNo - 100}`, stage: "sf", slot_no: matchNo - 100 };
            }

            // Match 103 is the third-place playoff. It is not scored in Footy Futures.
            if (matchNo === 104) {
              return { match_id: "final_m1", stage: "final", slot_no: 1 };
            }

            return null;
          }

          function readPath(obj, path) {
            return path.reduce((acc, key) => (acc == null ? undefined : acc[key]), obj);
          }

          function firstNumber(match, paths) {
            for (const path of paths) {
              const value = Array.isArray(path) ? readPath(match, path) : match[path];
              if (value === null || value === undefined || value === "") continue;
              const n = Number(value);
              if (Number.isFinite(n)) return n;
            }
            return null;
          }

          function getPenaltyScores(match) {
            const home = firstNumber(match, [
              ["penalties", "home"],
              ["penalty", "home"],
              ["penaltyScore", "home"],
              ["penaltyScores", "home"],
              ["shootout", "home"],
              ["score", "penalties", "home"],
              ["scores", "penalties", "home"],
              ["periods", "penalties", "home"],
              "penaltiesHome",
              "homePenalties",
              "homePenaltyScore",
              "penaltyHome",
              "shootoutHome"
            ]);

            const away = firstNumber(match, [
              ["penalties", "away"],
              ["penalty", "away"],
              ["penaltyScore", "away"],
              ["penaltyScores", "away"],
              ["shootout", "away"],
              ["score", "penalties", "away"],
              ["scores", "penalties", "away"],
              ["periods", "penalties", "away"],
              "penaltiesAway",
              "awayPenalties",
              "awayPenaltyScore",
              "penaltyAway",
              "shootoutAway"
            ]);

            return { home, away, has: home !== null && away !== null };
          }

          function getExtraTimeScores(match) {
            const home = firstNumber(match, [
              ["afterExtraTime", "home"],
              ["extraTime", "home"],
              ["aet", "home"],
              ["score", "afterExtraTime", "home"],
              ["score", "extraTime", "home"],
              ["scores", "afterExtraTime", "home"],
              ["scores", "extraTime", "home"],
              ["periods", "extra_time", "home"],
              ["periods", "extraTime", "home"],
              "afterExtraTimeHome",
              "extraTimeHome",
              "aetHome",
              "homeAfterExtraTime",
              "homeExtraTimeScore"
            ]);

            const away = firstNumber(match, [
              ["afterExtraTime", "away"],
              ["extraTime", "away"],
              ["aet", "away"],
              ["score", "afterExtraTime", "away"],
              ["score", "extraTime", "away"],
              ["scores", "afterExtraTime", "away"],
              ["scores", "extraTime", "away"],
              ["periods", "extra_time", "away"],
              ["periods", "extraTime", "away"],
              "afterExtraTimeAway",
              "extraTimeAway",
              "aetAway",
              "awayAfterExtraTime",
              "awayExtraTimeScore"
            ]);

            return { home, away, has: home !== null && away !== null };
          }

          function readApiWinnerName(match) {
            const candidates = [
              match.winnerName,
              match.winnerTeam,
              match.winner,
              match.winner?.name,
              match.result?.winnerName,
              match.result?.winner,
              match.result?.winner?.name
            ];
            return String(candidates.find(Boolean) || "").trim();
          }

          function getResolutionMethod(match) {
            const status = String(match.status || "").toLowerCase();
            const pens = getPenaltyScores(match);
            const aet = getExtraTimeScores(match);
            const apiWinner = readApiWinnerName(match);

            if (pens.has || status.includes("pen") || status.includes("shootout")) return "penalties";
            if (aet.has && aet.home !== aet.away) return "extra_time";
            if (status.includes("aet") || status.includes("extra")) return "extra_time";

            // If a knockout game is listed as a draw on scoreline but has a winner,
            // the missing resolution is almost always penalties.
            if (
              Number(match.homeScore) === Number(match.awayScore) &&
              apiWinner &&
              String(match.stage || "").toLowerCase() !== "group"
            ) {
              return "penalties";
            }

            return "regular_time";
          }

          function winner(match, homeCode, awayCode) {
            if (match.homeScore === null || match.homeScore === undefined) return { code: null, name: null };
            if (match.awayScore === null || match.awayScore === undefined) return { code: null, name: null };

            if (Number(match.homeScore) > Number(match.awayScore)) return { code: homeCode, name: match.homeTeam };
            if (Number(match.awayScore) > Number(match.homeScore)) return { code: awayCode, name: match.awayTeam };

            const pens = getPenaltyScores(match);
            if (pens.has) {
              if (pens.home > pens.away) return { code: homeCode, name: match.homeTeam };
              if (pens.away > pens.home) return { code: awayCode, name: match.awayTeam };
            }

            const aet = getExtraTimeScores(match);
            if (aet.has) {
              if (aet.home > aet.away) return { code: homeCode, name: match.homeTeam };
              if (aet.away > aet.home) return { code: awayCode, name: match.awayTeam };
            }

            const apiWinner = readApiWinnerName(match);
            if (apiWinner) {
              const apiWinnerCode = normTeam(apiWinner);
              if (apiWinnerCode === homeCode) return { code: homeCode, name: match.homeTeam };
              if (apiWinnerCode === awayCode) return { code: awayCode, name: match.awayTeam };
            }

            return { code: null, name: null };
          }

          async function supabase(path, options = {}) {
            const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
              ...options,
              headers: {
                "apikey": SERVICE_KEY,
                "Authorization": `Bearer ${SERVICE_KEY}`,
                "Content-Type": "application/json",
                "Prefer": "resolution=merge-duplicates",
                ...(options.headers || {})
              }
            });

            const text = await res.text();
            if (!res.ok) {
              throw new Error(`${res.status} ${res.statusText}: ${text}`);
            }
            return text ? JSON.parse(text) : null;
          }

          async function rpc(name) {
            const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/${name}`, {
              method: "POST",
              headers: {
                "apikey": SERVICE_KEY,
                "Authorization": `Bearer ${SERVICE_KEY}`,
                "Content-Type": "application/json"
              },
              body: "{}"
            });

            const text = await res.text();
            if (!res.ok) {
              throw new Error(`RPC ${name} failed: ${res.status} ${text}`);
            }
            return text;
          }

          const fixtureRows = await supabase(
            "fixture_map?select=match_id,stage,group_id,match_no,home_code,away_code,home_name,away_name,api_fixture_id"
          );

          console.log(`Loaded fixture_map rows: ${fixtureRows.length}`);

          const fixtureByTeamPair = new Map();
          for (const fixture of fixtureRows || []) {
            if (!fixture.home_code || !fixture.away_code) continue;
            const key = `${fixture.home_code}|${fixture.away_code}`;
            if (fixtureByTeamPair.has(key)) {
              throw new Error(`Duplicate fixture_map team pair found: ${key}`);
            }
            fixtureByTeamPair.set(key, fixture);
          }

          const rows = [];
          const fixtureApiUpdates = [];
          const skipped = [];

          for (const match of matches) {
            const status = String(match.status || "").toLowerCase();

            if (!isFinished(status)) {
              continue;
            }

            if (match.homeScore === null || match.homeScore === undefined) continue;
            if (match.awayScore === null || match.awayScore === undefined) continue;

            const homeCode = normTeam(match.homeTeam);
            const awayCode = normTeam(match.awayTeam);
            const apiFixtureId = String(match.id || "").trim();

            if (!homeCode || !awayCode) {
              skipped.push(`Unknown team code for API ${apiFixtureId}: ${match.homeTeam} vs ${match.awayTeam}`);
              continue;
            }

            const knockoutSlot = getInternalKnockoutSlot(match);
            let fixture = null;

            if (knockoutSlot) {
              // Knockout matches must be mapped by official match number into fixed Footy Futures slots.
              // This preserves bracket-path scoring: API Match 76, for example, always becomes r32_m4.
              fixture = {
                match_id: knockoutSlot.match_id,
                stage: knockoutSlot.stage,
                match_no: knockoutSlot.slot_no
              };
            } else {
              // Group matches keep the original validated fixture_map team-pair mapping.
              const pairKey = `${homeCode}|${awayCode}`;
              fixture = fixtureByTeamPair.get(pairKey);

              if (!fixture) {
                skipped.push(`No fixture_map row for API ${apiFixtureId}: ${match.homeTeam}(${homeCode}) vs ${match.awayTeam}(${awayCode}), matchNo=${match.matchNo}`);
                continue;
              }
            }

            const homeScore = Number(match.homeScore);
            const awayScore = Number(match.awayScore);

            if (!Number.isInteger(homeScore) || !Number.isInteger(awayScore)) {
              throw new Error(`Invalid score for API ${apiFixtureId}: ${match.homeScore}-${match.awayScore}`);
            }

            const win = winner(match, homeCode, awayCode);
            const resolutionMethod = getResolutionMethod(match);
            const penalties = getPenaltyScores(match);
            const extraTime = getExtraTimeScores(match);
            const nowIso = new Date().toISOString();

            rows.push({
              match_id: fixture.match_id,
              stage: fixture.stage || "group",
              match_no: Number(fixture.match_no),
              home_code: homeCode,
              home_name: match.homeTeam,
              away_code: awayCode,
              away_name: match.awayTeam,
              home_score: homeScore,
              away_score: awayScore,
              after_extra_time_home: extraTime.home,
              after_extra_time_away: extraTime.away,
              penalties_home: penalties.home,
              penalties_away: penalties.away,
              winner_code: win.code,
              winner_name: win.name,
              resolution_method: resolutionMethod,
              completed: true,
              played_at: match.kickoffUtc || match.date || nowIso,
              updated_at: nowIso,
              api_provider: "zafronix",
              api_fixture_id: apiFixtureId,
              api_status: status,
              last_synced_at: nowIso
            });

            if (!knockoutSlot) {
              fixtureApiUpdates.push({
                match_id: fixture.match_id,
                api_fixture_id: apiFixtureId
              });
            }
          }

          console.log(`Completed matches mapped for upsert: ${rows.length}`);
          if (skipped.length) {
            console.log("Skipped finished matches:");
            for (const item of skipped) console.log(`- ${item}`);
          }

          for (const update of fixtureApiUpdates) {
            await supabase(`fixture_map?match_id=eq.${encodeURIComponent(update.match_id)}`, {
              method: "PATCH",
              headers: { "Prefer": "return=minimal" },
              body: JSON.stringify({ api_fixture_id: update.api_fixture_id })
            });
          }

          if (rows.length > 0) {
            await supabase("actual_results?on_conflict=match_id", {
              method: "POST",
              body: JSON.stringify(rows)
            });
            console.log(`Upserted ${rows.length} completed results.`);
          } else {
            console.log("No completed matches to sync yet.");
          }

          const validationErrors = await supabase("actual_results_validation_errors?select=*");
          if (validationErrors.length > 0) {
            console.error("Validation warnings after sync:", JSON.stringify(validationErrors, null, 2));

            // The existing validation view was created for group-stage fixture_map checks.
            // Keep blocking group mapping errors, but do not fail the workflow only because
            // knockout slots are now synced directly as r32_m*, r16_m*, qf_m*, sf_m*, final_m1.
            const blockingErrors = validationErrors.filter(err =>
              /^g[A-L]_m\d+$/i.test(String(err.match_id || ""))
            );

            if (blockingErrors.length > 0) {
              throw new Error(`actual_results validation failed with ${blockingErrors.length} group-stage row(s).`);
            }

            console.log("No blocking group-stage validation errors. Continuing with knockout sync.");
          } else {
            console.log("Validation clean: 0 actual_results_validation_errors rows.");
          }

          const recalculated = await rpc("admin_recalculate_all_scores");
          console.log("Recalculate result:", recalculated);
          NODE
